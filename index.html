<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishal Akshintala | AI & Privacy Governance Diagnostic</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #3b82f6;
            --text: #ffffff;
            --muted: #9aa4b2;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
            --warning: #fbbf24;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        section { padding: 80px 8%; }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
        }

        /* --- DIAGNOSTIC UI --- */
        #analyzer-container { max-width: 1100px; margin: 0 auto; min-height: 500px; }
        .quiz-step { display: none; text-align: center; }
        .quiz-step.active { display: block; animation: fadeIn 0.5s ease; }

        .option-btn {
            display: block; width: 100%; max-width: 500px; margin: 15px auto; padding: 20px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; border-radius: 12px; text-align: left; cursor: pointer; transition: 0.3s;
        }
        .option-btn:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        /* --- RESULTS DASHBOARD --- */
        .dashboard-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px;
        }
        .heatmap-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px;
        }
        .heatmap-cell {
            padding: 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .risk-badge {
            display: inline-block; padding: 6px 15px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<section id="analyzer-section">
    <div id="analyzer-container" class="glass-card">
        
        <div class="quiz-step active" id="step-0">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Risk Diagnostic Engine</h2>
            <p style="color: var(--muted); margin-bottom: 40px;">Quantify your regulatory exposure across AI and Privacy domains.</p>
            <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                <button class="option-btn" onclick="startAudit('AI')">
                    <strong>AI Governance Audit</strong><br>
                    <small>EU AI Act & ISO 42001 Readiness</small>
                </button>
                <button class="option-btn" onclick="startAudit('PRIVACY')">
                    <strong>Privacy Architecture Audit</strong><br>
                    <small>DPDPA & GDPR Compliance</small>
                </button>
            </div>
        </div>

        <div class="quiz-step" id="step-q">
            <div id="q-progress" style="color: var(--accent); font-weight: 800; font-size: 0.75rem; margin-bottom: 20px; letter-spacing: 2px;"></div>
            <h3 id="q-text" style="font-size: 1.5rem; margin-bottom: 40px; min-height: 80px;"></h3>
            <button class="option-btn" onclick="processInput(true)" style="text-align: center; border-color: var(--success);">Yes / Fully Implemented</button>
            <button class="option-btn" onclick="processInput(false)" style="text-align: center; border-color: var(--danger);">No / Unsure / In Progress</button>
        </div>

        <div class="quiz-step" id="step-res">
            <div id="risk-tag" class="risk-badge"></div>
            <h2 id="res-title" style="margin-bottom: 5px;"></h2>
            <p id="res-desc" style="color: var(--muted); margin-bottom: 30px;"></p>

            <div class="dashboard-grid">
                <div class="glass-card" style="padding: 20px;">
                    <p style="font-size: 0.8rem; font-weight: 800; color: var(--accent); margin-bottom: 15px;">RISK DISTRIBUTION (RADAR)</p>
                    <canvas id="riskRadar"></canvas>
                </div>

                <div class="glass-card" style="padding: 20px;">
                    <p style="font-size: 0.8rem; font-weight: 800; color: var(--accent); margin-bottom: 15px;">LIABILITY HEATMAP</p>
                    <div class="heatmap-grid" id="heatmap">
                        </div>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border);">
                        <p style="font-weight: 800; margin-bottom: 10px;">Risk Profile Summary:</p>
                        <ul id="profile-summary" style="text-align: left; font-size: 0.85rem; color: var(--muted); padding-left: 20px;">
                            </ul>
                    </div>
                    
                    <a href="https://calendly.com/vishal-advocate/30min" target="_blank" 
                       style="display: block; margin-top: 25px; padding: 15px; background: #fff; color: #000; text-decoration: none; border-radius: 8px; font-weight: 700;">
                        Schedule Strategic Mitigation
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // --- AUDIT DATA ---
    const aiAudit = [
        { q: "Is your AI system used in high-stakes sectors (Employment, Finance, Healthcare, Education)?", cat: "Liability", w: 30 },
        { q: "Does your system process biometric data or perform automated emotional recognition?", cat: "Liability", w: 25 },
        { q: "Do you have a formally documented AI Risk Management Framework (ISO 42001 style)?", cat: "Governance", w: 20 },
        { q: "Are technical logs and model performance metrics stored for regulatory audit?", cat: "Documentation", w: 15 },
        { q: "Is there a designated 'Human-in-the-loop' protocol for high-risk outputs?", cat: "Governance", w: 20 },
        { q: "Are training datasets audited for bias and copyright provenance?", cat: "Documentation", w: 20 },
        { q: "Is there a public-facing notice explaining AI's role in decision-making?", cat: "Transparency", w: 15 },
        { q: "Do you have an active AI incident monitoring and reporting system?", cat: "Transparency", w: 15 }
    ];

    const privacyAudit = [
        { q: "Do you transfer personal data across jurisdictions (India, EU, US)?", cat: "Jurisdiction", w: 30 },
        { q: "Have you mapped data flows to meet the new India DPDPA requirements?", cat: "Legal Basis", w: 25 },
        { q: "Is your privacy notice standalone and purpose-specific (not just a generic link)?", cat: "Ops Controls", w: 20 },
        { q: "Do you have a Record of Processing Activities (RoPA) for all datasets?", cat: "Ops Controls", w: 15 },
        { q: "Are Data Processing Agreements (DPAs) signed with all sub-processors?", cat: "Jurisdiction", w: 20 },
        { q: "Do you have a tested 72-hour regulatory breach notification protocol?", cat: "Breach Readiness", w: 25 },
        { q: "Are Data Protection Impact Assessments (DPIAs) conducted for new features?", cat: "Legal Basis", w: 20 },
        { q: "Can you respond to a Data Subject Access Request (DSAR) within 30 days?", cat: "Breach Readiness", w: 15 }
    ];

    let activeSet = [];
    let qIdx = 0;
    let scores = {}; // Store weights by category

    function startAudit(type) {
        activeSet = type === 'AI' ? aiAudit : privacyAudit;
        qIdx = 0;
        scores = {};
        activeSet.forEach(item => scores[item.cat] = 0);
        
        document.getElementById('step-0').classList.remove('active');
        document.getElementById('step-q').classList.add('active');
        renderQ();
    }

    function renderQ() {
        const q = activeSet[qIdx];
        document.getElementById('q-progress').innerText = `DIAGNOSTIC POINT ${qIdx + 1} / ${activeSet.length}`;
        document.getElementById('q-text').innerText = q.q;
    }

    function processInput(isYes) {
        // If "No", increase the risk score for that category
        if (!isYes) {
            const q = activeSet[qIdx];
            scores[q.cat] += q.w;
        }
        qIdx++;
        if (qIdx < activeSet.length) renderQ(); else showResults();
    }

    function showResults() {
        document.getElementById('step-q').classList.remove('active');
        document.getElementById('step-res').classList.add('active');

        const cats = Object.keys(scores);
        const dataValues = cats.map(c => Math.min(scores[c] + 15, 100)); // normalized risk

        // 1. RADAR CHART
        new Chart(document.getElementById('riskRadar'), {
            type: 'radar',
            data: {
                labels: cats,
                datasets: [{
                    label: 'Risk Score',
                    data: dataValues,
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: '#3b82f6',
                    pointBackgroundColor: '#fff'
                }]
            },
            options: {
                scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' } } },
                plugins: { legend: { display: false } }
            }
        });

        // 2. HEATMAP & TAGS
        const heatmap = document.getElementById('heatmap');
        const summary = document.getElementById('profile-summary');
        let totalRisk = 0;

        cats.forEach(c => {
            const risk = scores[c];
            totalRisk += risk;
            let color = 'var(--success)';
            let label = 'LOW';
            if (risk > 15) { color = 'var(--warning)'; label = 'MID'; }
            if (risk > 30) { color = 'var(--danger)'; label = 'HIGH'; }

            heatmap.innerHTML += `<div class="heatmap-cell" style="background:${color}22; color:${color}; border-color:${color}44;">${c}: ${label}</div>`;
            summary.innerHTML += `<li>Gaps identified in <strong>${c}</strong> require immediate documentation.</li>`;
        });

        // 3. FINAL PROFILE TAG
        const tag = document.getElementById('risk-tag');
        if (totalRisk > 50) {
            tag.innerText = "CRITICAL EXPOSURE"; tag.style.background = 'var(--danger)';
            document.getElementById('res-title').innerText = "Material Regulatory Friction";
            document.getElementById('res-desc').innerText = "Strategic gaps detected. Compliance failure is likely during enterprise due diligence.";
        } else {
            tag.innerText = "MODERATE RISK"; tag.style.background = 'var(--warning)';
            document.getElementById('res-title').innerText = "Governance Maturity Gap";
            document.getElementById('res-desc').innerText = "Baseline controls present, but lacks the technical 'defensibility' required for global scale.";
        }
    }
</script>

</body>
</html>
